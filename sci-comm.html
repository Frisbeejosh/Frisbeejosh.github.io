<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science Communication</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cream: #f7f4ef;
      --ink: #1c1a17;
      --ink-light: #5a5750;
      --ink-faint: #9a9590;
      --moss: #3d5a3e;
      --moss-light: #e8ede8;
      --rule: rgba(28,26,23,0.12);

      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    html { background: var(--cream); }

    body {
      font-family: var(--sans);
      color: var(--ink);
      background: var(--cream);
      -webkit-font-smoothing: antialiased;
    }

    .page-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    /* ── Section headers ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .section-body + .section-header,
    .podcast-stack + .section-header {
      margin-top: 4rem;
    }

    .section-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      white-space: nowrap;
    }

    .section-rule {
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    /* ── Flynnstone intro block ── */
    .intro-block {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 2.5rem;
      align-items: start;
      animation: fadeUp 0.7s ease both;
    }

    .intro-block img {
      width: 100%;
      border-radius: 4px;
      display: block;
      object-fit: cover;
      aspect-ratio: 5/6;
    }

    .intro-block .text p {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 300;
      line-height: 1.75;
      color: var(--ink-light);
    }

    .intro-block .text a {
      color: var(--moss);
      text-decoration: none;
      border-bottom: 1px solid var(--moss-light);
      transition: border-color 0.2s;
    }

    .intro-block .text a:hover {
      border-color: var(--moss);
    }

    /* ── Podcast stack ── */
    .podcast-stack {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      animation: fadeUp 0.7s ease both;
      animation-delay: 0.1s;
    }

    .podcast-stack .episode-label {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 0.5rem;
      display: block;
    }

    .podcast-stack iframe {
      display: block;
      border-radius: 12px;
      width: 100%;
    }

    /* ── Shared ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 680px) {
      .page-wrapper { padding: 3rem 1.25rem 5rem; }

      .intro-block {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
<div class="page-wrapper">

  <!-- ── Intro ──────────────────────────────────────────── -->
  <div class="section-header">
    <span class="section-label">Science Communication</span>
    <div class="section-rule"></div>
  </div>

  <div class="intro-block">
    <img src="assets/images/flynnstone_bb.JPG" alt="flynnstone dapped me up!">
    <div class="text">
      <p>the one and only <a href="https://youtube.com/@flynnstone5850?si=UYS6ff63h6u8YAG1">flynnstone</a> dapped me up with this flick!</p>
    </div>
  </div>


  <!-- ── podcast ──────────────────────────────── -->
  <div class="section-header" style="margin-top:4rem;">
    <span class="section-label">podcasts</span>
    <div class="section-rule"></div>
  </div>

  <div class="podcast-stack">
    <div>
      <span class="episode-label">lets chat about catopsis beteroniana...</span>
      <iframe
        src="https://open.spotify.com/embed/episode/3KSHwRFfk9nl3wPY0wfRCT?utm_source=generator"

      </iframe>
    </div>

        loading="lazy">
      </iframe>
    </div>

    <div>
      <span class="episode-label">why do flowers have different smells?</span>
      <iframe

</div>
</body>
</html>
