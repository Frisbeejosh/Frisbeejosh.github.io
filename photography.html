---
title: Photography
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cream: #f7f4ef;
      --ink: #1c1a17;
      --ink-light: #5a5750;
      --ink-faint: #9a9590;
      --moss: #3d5a3e;
      --moss-light: #e8ede8;
      --rule: rgba(28,26,23,0.12);

      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    html {
      background: var(--cream);
    }

    body {
      font-family: var(--sans);
      color: var(--ink);
      background: var(--cream);
      -webkit-font-smoothing: antialiased;
    }

    .page-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    .hero {
      padding-bottom: 3rem;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 3.5rem;
      animation: fadeUp 0.7s ease both;
    }

    .hero-title {
      font-family: var(--serif);
      font-size: 3rem;
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }

    .hero-sub {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--ink-faint);
      font-style: italic;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .section-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      white-space: nowrap;
    }

    .section-rule {
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      animation: fadeUp 0.7s ease both;
      animation-delay: 0.1s;
    }

    .gallery-item {
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      background: var(--moss-light);
      aspect-ratio: 4/3;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.04);
    }

    .gallery-item .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(28,26,23,0.55) 0%,
        transparent 50%
      );

      opacity: 0;
      transition: opacity 0.3s ease;

      display: flex;
      align-items: flex-end;
      padding: 0.75rem;
    }

    .gallery-item:hover .overlay {
      opacity: 1;
    }

    .overlay-title {
      font-family: var(--serif);
      font-size: 0.9rem;
      font-style: italic;
      color: #f7f4ef;
      line-height: 1.3;
    }

    /* Lightbox */

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(28,26,23,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-inner {
      position: relative;
      max-width: 820px;
      width: 100%;
      animation: fadeUp 0.25s ease both;
    }

    .lightbox-inner img {
      width: 100%;
      max-height: 80vh;
      object-fit: contain;
      display: block;
      border-radius: 4px;
    }

    .lightbox-caption {
      font-family: var(--serif);
      font-size: 1rem;
      font-style: italic;
      color: var(--ink-faint);
      margin-top: 0.75rem;
      text-align: center;
    }

    .lightbox-close {
      position: absolute;
      top: -2.5rem;
      right: 0;

      background: none;
      border: none;

      color: #f7f4ef;
      font-size: 1.5rem;
      cursor: pointer;

      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .lightbox-close:hover {
      opacity: 1;
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);

      background: none;
      border: 1px solid rgba(247,244,239,0.25);

      color: #f7f4ef;

      width: 40px;
      height: 40px;
      border-radius: 50%;

      cursor: pointer;
      font-size: 1.1rem;

      display: flex;
      align-items: center;
      justify-content: center;

      transition: background 0.2s;
    }

    .lightbox-nav:hover {
      background: rgba(247,244,239,0.1);
    }

    .lightbox-nav.prev {
      left: -3.5rem;
    }

    .lightbox-nav.next {
      right: -3.5rem;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 680px) {

      .page-wrapper {
        padding: 3rem 1.25rem 5rem;
      }

      .hero-title {
        font-size: 2.4rem;
      }

      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .lightbox-nav.prev {
        left: -0.5rem;
      }

      .lightbox-nav.next {
        right: -0.5rem;
      }
    }
  </style>
</head>

<body>

<div class="page-wrapper">

  <div class="hero">
    <h1 class="hero-title">photographs</h1>
    <p class="hero-sub">field notes in light</p>
  </div>

  <div class="section-header">
    <span class="section-label">Gallery</span>
    <div class="section-rule"></div>
  </div>

  <div class="gallery-grid" id="gallery">

    <div class="gallery-item" data-index="0">
      <img src="assets/images/john-climbing.jpg" alt="Fakahatchee Strand, FL">

      <div class="overlay">
        <span class="overlay-title">Fakahatchee Strand, FL</span>
      </div>
    </div>

    <div class="gallery-item" data-index="1">
      <img src="assets/images/the-girls-pose.jpg" alt="Catopsis nutans">

      <div class="overlay">
        <span class="overlay-title">Catopsis nutans</span>
      </div>
    </div>

    <div class="gallery-item" data-index="2">
      <img src="assets/images/ella-boss.jpg" alt="Costa Rica">

      <div class="overlay">
        <span class="overlay-title">Costa Rica</span>
      </div>
    </div>

    <div class="gallery-item" data-index="3">
      <img src="assets/images/ella-jorge.jpg" alt="Belize">

      <div class="overlay">
        <span class="overlay-title">Belize</span>
      </div>
    </div>

    <div class="gallery-item" data-index="4">
      <img src="assets/images/selby.jpg" alt="Tillandsioideae">

      <div class="overlay">
        <span class="overlay-title">Tillandsioideae</span>
      </div>
    </div>

    <div class="gallery-item" data-index="5">
      <img src="assets/images/cole-atv.jpg" alt="Panama">

      <div class="overlay">
        <span class="overlay-title">Panama</span>
      </div>
    </div>

    <div class="gallery-item" data-index="6">
      <img src="assets/images/paco-thinking.jpg" alt="Panama">

      <div class="overlay">
        <span class="overlay-title">Panama</span>
      </div>
    </div>

    <div class="gallery-item" data-index="7">
      <img src="assets/images/girls-lunch.jpg" alt="Panama">

      <div class="overlay">
        <span class="overlay-title">Panama</span>
      </div>
    </div>

    <div class="gallery-item" data-index="8">
      <img src="assets/images/tree-belize.jpg" alt="Belize">

      <div class="overlay">
        <span class="overlay-title">Belize</span>
      </div>
    </div>

  </div>

</div>

<!-- Lightbox -->

<div class="lightbox" id="lightbox">

  <div class="lightbox-inner">

    <button class="lightbox-close" id="lb-close">✕</button>

    <button class="lightbox-nav prev" id="lb-prev">
      &#8592;
    </button>

    <button class="lightbox-nav next" id="lb-next">
      &#8594;
    </button>

    <img id="lb-img" src="" alt="">

    <p class="lightbox-caption" id="lb-caption"></p>

  </div>

</div>

<script>

  const photos = [
    {
      src: 'assets/images/john-climbing.jpg',
      title: 'Fakahatchee Strand, FL'
    },

    {
      src: 'assets/images/the-girls-pose.jpg',
      title: 'Catopsis nutans'
    },

    {
      src: 'assets/images/ella-boss.jpg',
      title: 'Costa Rica'
    },

    {
      src: 'assets/images/ella-jorge.jpg',
      title: 'Belize'
    },

    {
      src: 'assets/images/selby.jpg',
      title: 'Tillandsioideae'
    },

    {
      src: 'assets/images/cole-atv.jpg',
      title: 'Panama'
    },

    {
      src: 'assets/images/paco-thinking.jpg',
      title: 'Panama'
    },

    {
      src: 'assets/images/girls-lunch.jpg',
      title: 'Panama'
    },

    {
      src: 'assets/images/tree-belize.jpg',
      title: 'Belize'
    }
  ];

  let current = 0;

  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbCap = document.getElementById('lb-caption');

  function openLightbox(i) {
    current = i;

    lbImg.src = photos[i].src;
    lbCap.textContent = photos[i].title;

    lb.classList.add('open');
  }

  function closeLightbox() {
    lb.classList.remove('open');
  }

  function navigate(dir) {

    current = (
      current + dir + photos.length
    ) % photos.length;

    lbImg.src = photos[current].src;
    lbCap.textContent = photos[current].title;
  }

  document.querySelectorAll('.gallery-item').forEach(el => {

    el.addEventListener('click', () => {
      openLightbox(+el.dataset.index);
    });

  });

  document.getElementById('lb-close')
    .addEventListener('click', closeLightbox);

  document.getElementById('lb-prev')
    .addEventListener('click', () => navigate(-1));

  document.getElementById('lb-next')
    .addEventListener('click', () => navigate(1));

  lb.addEventListener('click', e => {

    if (e.target === lb) {
      closeLightbox();
    }

  });

  document.addEventListener('keydown', e => {

    if (!lb.classList.contains('open')) return;

    if (e.key === 'Escape') closeLightbox();

    if (e.key === 'ArrowLeft') navigate(-1);

    if (e.key === 'ArrowRight') navigate(1);

  });

</script>

</body>
</html>
